# docker-compose.prod.yml
services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:${IMAGE_TAG:-latest}
    container_name: property-pulse-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    depends_on:
      - mongodb

  mongodb:
    image: mongo:7
    container_name: property-pulse-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: property-pulse
    volumes:
      - mongodb_data:/data/db
      - ./.docker/seed/properties.js:/docker-entrypoint-initdb.d/properties.js:ro
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: property-pulse-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data: