services:
  backend:
    container_name: property-pulse-db
    image: mongo:latest
    restart: unless-stopped
    # ports:
    #   - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: property-pulse
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - ./.docker/seed/properties.js:/docker-entrypoint-initdb.d/properties.js
      - mongodb_data:/data/db
    healthcheck:
      test: |
        mongosh --quiet \
          -u "$$MONGO_INITDB_ROOT_USERNAME" \
          -p "$$MONGO_INITDB_ROOT_PASSWORD" \
          --authenticationDatabase admin \
          --eval "db.adminCommand('ping')" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  application:
    container_name: property-pulse-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MONGO_URI: ${MONGO_URI}
        MONGO_ROOT_USER: ${MONGO_ROOT_USER}
        MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
        NEXTAUTH_URL_INTERNAL: ${NEXTAUTH_URL_INTERNAL}
        NEXT_PUBLIC_DOMAIN: ${NEXT_PUBLIC_DOMAIN}
        NEXT_PUBLIC_API_DOMAIN: ${NEXT_PUBLIC_API_DOMAIN}
        NEXT_PUBLIC_GOOGLE_GEOCODING_API_KEY: ${NEXT_PUBLIC_GOOGLE_GEOCODING_API_KEY}
        GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
        GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
        CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
        CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
        CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    image: ${DOCKER_IMAGE:-property-pulse-local:latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ${ENV_FILE:-.env.local}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local