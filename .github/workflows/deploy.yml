name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'  # triggers on tags like v1.0.0, v1.2.3

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build  # waits for build job to pass first
    if: startsWith(github.ref, 'refs/tags/v')  # only runs on tag push

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/property-pulse
            git fetch --tags
            git checkout ${{ github.ref_name }}
            npm ci
            npm run build
            pm2 restart property-pulse || pm2 start npm --name "property-pulse" -- start
            pm2 save